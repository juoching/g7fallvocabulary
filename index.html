<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>七年級上學期單字複習</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #12131C;
    --card: #1E2030;
    --card2: #232537;
    --card3: #2A2D45;
    --text: #FFFFFF;
    --text-sub: #A0A5B5;
    --green: #2BDE73;
    --green-dim: #1a6b3c;
    --red: #FF4D6A;
    --red-dim: #7a1a2b;
    --purple: #7C5CFC;
    --purple-hover: #9575FF;
    --border: #353752;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'Noto Sans TC', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  /* ══════════════════════════════
     HOME SCREEN
  ══════════════════════════════ */
  #home-screen {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
    animation: fadeUp 0.5s ease;
  }

  .home-header {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .home-icon {
    font-size: 64px;
    line-height: 1;
    filter: drop-shadow(0 4px 24px rgba(124,92,252,0.4));
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .home-title {
    font-size: clamp(26px, 6vw, 36px);
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 30%, #9575FF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .home-subtitle {
    font-size: 14px;
    color: var(--text-sub);
    font-weight: 500;
  }

  /* Stats cards */
  .home-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
  }

  .home-stat-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 20px 16px;
    text-align: center;
  }

  .home-stat-num {
    font-size: 40px;
    font-weight: 800;
    line-height: 1;
    color: var(--purple);
  }

  .home-stat-label {
    font-size: 13px;
    color: var(--text-sub);
    font-weight: 500;
    margin-top: 6px;
  }

  /* Info card */
  .home-info-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 22px 24px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .home-info-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .home-info-icon {
    font-size: 22px;
    flex-shrink: 0;
    width: 36px;
    text-align: center;
  }

  .home-info-text {
    font-size: 14px;
    color: var(--text-sub);
    line-height: 1.5;
  }

  .home-info-text strong {
    color: var(--text);
  }

  .home-info-divider {
    height: 1px;
    background: var(--border);
  }

  /* Start button */
  .start-btn {
    background: linear-gradient(135deg, #7C5CFC, #9575FF);
    color: #fff;
    font-size: 18px;
    font-weight: 800;
    border: none;
    border-radius: 18px;
    padding: 20px;
    width: 100%;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 6px 28px rgba(124,92,252,0.4);
    letter-spacing: 0.5px;
  }

  .start-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 36px rgba(124,92,252,0.55);
  }

  .start-btn:active { transform: scale(0.98); }

  /* ══════════════════════════════
     QUIZ SCREEN
  ══════════════════════════════ */
  #quiz-screen {
    width: 100%;
    max-width: 560px;
    display: none;
    flex-direction: column;
    gap: 20px;
  }

  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .progress-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .q-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sub);
    letter-spacing: 0.5px;
  }

  .progress-track {
    width: 100%;
    height: 7px;
    background: var(--card2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #7C5CFC, #2BDE73);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  .score-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: 99px;
    padding: 6px 16px;
    font-size: 15px;
    font-weight: 700;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .score-badge .check-icon { color: var(--green); font-size: 17px; }

  .word-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 36px 28px 32px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.35);
  }

  .card-hint {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sub);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: var(--card2);
    border-radius: 99px;
    padding: 4px 14px;
  }

  .word-display {
    font-size: clamp(32px, 7vw, 52px);
    font-weight: 800;
    color: var(--text);
    letter-spacing: -1px;
    line-height: 1.1;
    margin-top: 6px;
    word-break: break-word;
  }

  .word-pos {
    font-size: clamp(13px, 2.5vw, 16px);
    font-weight: 500;
    color: var(--text-sub);
    background: var(--card3);
    border-radius: 99px;
    padding: 3px 12px;
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .option-btn {
    background: var(--card2);
    border: 2px solid var(--border);
    border-radius: 16px;
    color: var(--text);
    font-size: clamp(13px, 3.2vw, 16px);
    font-weight: 600;
    padding: 20px 12px;
    cursor: pointer;
    text-align: center;
    transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    line-height: 1.3;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .option-btn:hover:not(:disabled) {
    background: var(--card3);
    border-color: var(--purple);
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 4px 20px rgba(124,92,252,0.25);
  }

  .option-btn:active:not(:disabled) { transform: scale(0.97); }

  .option-btn.correct {
    background: var(--green-dim);
    border-color: var(--green);
    color: var(--green);
    box-shadow: 0 0 20px rgba(43,222,115,0.3);
    animation: pop 0.25s ease;
  }

  .option-btn.wrong {
    background: var(--red-dim);
    border-color: var(--red);
    color: var(--red);
    animation: shake 0.35s ease;
  }

  .option-btn:disabled { cursor: default; }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* ══════════════════════════════
     RESULT SCREEN
  ══════════════════════════════ */
  #result-screen {
    display: none;
    width: 100%;
    max-width: 560px;
    flex-direction: column;
    gap: 20px;
  }

  .result-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.35);
  }

  .trophy-emoji {
    font-size: 56px;
    display: block;
    margin-bottom: 12px;
    animation: trophy-bounce 0.6s cubic-bezier(.4,0,.2,1);
  }

  @keyframes trophy-bounce {
    0% { transform: scale(0) rotate(-10deg); opacity: 0; }
    70% { transform: scale(1.15) rotate(3deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .result-title {
    font-size: clamp(22px, 5vw, 28px);
    font-weight: 800;
    margin-bottom: 6px;
  }

  .result-subtitle {
    color: var(--text-sub);
    font-size: 14px;
    font-weight: 500;
  }

  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 20px;
  }

  .stat-box {
    border-radius: 16px;
    padding: 18px 12px;
    text-align: center;
    border: 1.5px solid;
  }

  .stat-box.green-box { background: rgba(43,222,115,0.08); border-color: var(--green); }
  .stat-box.red-box { background: rgba(255,77,106,0.08); border-color: var(--red); }

  .stat-number { font-size: 48px; font-weight: 800; line-height: 1; }
  .green-box .stat-number { color: var(--green); }
  .red-box .stat-number { color: var(--red); }

  .stat-label { font-size: 13px; font-weight: 600; margin-top: 6px; color: var(--text-sub); }

  .time-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 18px;
    padding: 14px 16px;
    background: var(--card2);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    flex-wrap: wrap;
  }

  .time-item { display: flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 600; }
  .time-item .time-icon { font-size: 16px; }
  .time-item .time-value { color: var(--text); }
  .time-item .time-label { color: var(--text-sub); font-size: 12px; font-weight: 500; }
  .time-divider { width: 1px; height: 28px; background: var(--border); }

  .review-section {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 20px 20px 0;
    box-shadow: 0 8px 40px rgba(0,0,0,0.35);
    overflow: hidden;
  }

  .review-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text-sub);
    padding-bottom: 12px;
    border-bottom: 1.5px solid var(--border);
  }

  .review-list {
    max-height: 280px;
    overflow-y: auto;
    padding: 8px 0 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .review-list::-webkit-scrollbar { width: 4px; }
  .review-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .review-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 4px;
    border-bottom: 1px solid rgba(53,55,82,0.5);
  }

  .review-item:last-child { border-bottom: none; }
  .review-icon { font-size: 15px; flex-shrink: 0; width: 20px; text-align: center; }
  .review-word { font-weight: 700; font-size: 15px; flex: 1; }
  .review-word.correct-word { color: var(--green); }
  .review-word.wrong-word { color: var(--red); }
  .review-def { color: var(--text-sub); font-size: 13px; text-align: right; flex-shrink: 0; max-width: 50%; }

  .result-btns {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .play-again-btn {
    background: var(--purple);
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    border: none;
    border-radius: 16px;
    padding: 18px;
    width: 100%;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(124,92,252,0.35);
    letter-spacing: 0.3px;
  }

  .play-again-btn:hover {
    background: var(--purple-hover);
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(124,92,252,0.45);
  }

  .play-again-btn:active { transform: scale(0.98); }

  .back-home-btn {
    background: transparent;
    color: var(--text-sub);
    font-size: 14px;
    font-weight: 600;
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 14px;
    width: 100%;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s, background 0.15s;
  }

  .back-home-btn:hover {
    color: var(--text);
    border-color: var(--text-sub);
    background: var(--card2);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeUp 0.3s ease; }
</style>
</head>
<body>

<!-- ══ HOME SCREEN ══ -->
<div id="home-screen">
  <div class="home-header">
    <div class="home-icon">📚</div>
    <h1 class="home-title">七年級上學期單字複習</h1>
    <p class="home-subtitle">Junior High School Grade 7 · Vocabulary Quiz</p>
  </div>

  <div class="home-stats">
    <div class="home-stat-card">
      <div class="home-stat-num">217</div>
      <div class="home-stat-label">📖 總單字數</div>
    </div>
    <div class="home-stat-card">
      <div class="home-stat-num">20</div>
      <div class="home-stat-label">🎯 每回練習題數</div>
    </div>
  </div>

  <div class="home-info-card">
    <div class="home-info-row">
      <span class="home-info-icon">🔀</span>
      <span class="home-info-text">每次從 <strong>217 個單字</strong>中隨機抽取 <strong>20 題</strong>，題目與選項順序皆隨機排列</span>
    </div>
    <div class="home-info-divider"></div>
    <div class="home-info-row">
      <span class="home-info-icon">✅</span>
      <span class="home-info-text"><strong>答對才能進入下一題</strong>，答錯時選項會停用，繼續作答直到選對為止</span>
    </div>
    <div class="home-info-divider"></div>
    <div class="home-info-row">
      <span class="home-info-icon">📝</span>
      <span class="home-info-text">完成後顯示<strong>答題結果</strong>與<strong>本回複習清單</strong>，記錄答對與答錯的單字</span>
    </div>
  </div>

  <button class="start-btn" onclick="startGame()">🚀 開始練習</button>
</div>

<!-- ══ QUIZ SCREEN ══ -->
<div id="quiz-screen">
  <div class="status-bar">
    <div class="progress-left">
      <span class="q-label" id="q-label">題 1 / 20</span>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>
    <div class="score-badge">
      <span class="check-icon">✓</span>
      <span id="score-display">0</span>
    </div>
  </div>

  <div class="word-card fade-in" id="word-card">
    <span class="card-hint">英文是什麼意思？</span>
    <div class="word-display" id="word-display">---</div>
    <span class="word-pos" id="word-pos"></span>
  </div>

  <div class="options-grid" id="options-grid">
    <button class="option-btn" id="opt-0"></button>
    <button class="option-btn" id="opt-1"></button>
    <button class="option-btn" id="opt-2"></button>
    <button class="option-btn" id="opt-3"></button>
  </div>
</div>

<!-- ══ RESULT SCREEN ══ -->
<div id="result-screen">
  <div class="result-card">
    <span class="trophy-emoji" id="trophy-emoji">🏆</span>
    <div class="result-title" id="result-title">完美！全部答對！</div>
    <div class="result-subtitle" id="result-subtitle">答對 20 / 20 題</div>
    <div class="stats-row">
      <div class="stat-box green-box">
        <div class="stat-number" id="correct-count">20</div>
        <div class="stat-label">✓ 答對</div>
      </div>
      <div class="stat-box red-box">
        <div class="stat-number" id="wrong-count">0</div>
        <div class="stat-label">✗ 答錯</div>
      </div>
    </div>
    <div class="time-row">
      <div class="time-item">
        <span class="time-icon">📅</span>
        <div>
          <div class="time-value" id="result-date">—</div>
          <div class="time-label">練習日期</div>
        </div>
      </div>
      <div class="time-divider"></div>
      <div class="time-item">
        <span class="time-icon">⏱️</span>
        <div>
          <div class="time-value" id="result-duration">—</div>
          <div class="time-label">總練習時間</div>
        </div>
      </div>
    </div>
  </div>

  <div class="review-section">
    <div class="review-title">📝 本回複習</div>
    <div class="review-list" id="review-list"></div>
  </div>

  <div class="result-btns">
    <button class="play-again-btn" onclick="startGame()">🔄 再玩一次（新題目）</button>
    <button class="back-home-btn" onclick="goHome()">🏠 回到首頁</button>
  </div>
</div>

const TOTAL = 20;
let questions = [];
let current = 0;
let score = 0;
let answered = false;
let results = [];
let startTime = null;
let wrongThisQuestion = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickQuestions() {
  const pool = shuffle(WORD_BANK).slice(0, TOTAL);
  return pool.map(item => {
    const wrong = shuffle(WORD_BANK.filter(w => w.id !== item.id)).slice(0, 3);
    const options = shuffle([item, ...wrong]);
    return { ...item, options };
  });
}

function goHome() {
  document.getElementById('result-screen').style.display = 'none';
  const home = document.getElementById('home-screen');
  home.style.display = 'flex';
  home.style.animation = 'none';
  void home.offsetWidth;
  home.style.animation = 'fadeUp 0.4s ease';
}

function startGame() {
  questions = pickQuestions();
  current = 0;
  score = 0;
  answered = false;
  results = [];
  startTime = Date.now();

  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  const qs = document.getElementById('quiz-screen');
  qs.style.display = 'flex';
  document.getElementById('score-display').textContent = '0';
  document.getElementById('progress-fill').style.width = '0%';
  updateQuestion();
}

function updateQuestion() {
  const q = questions[current];
  wrongThisQuestion = false;
  document.getElementById('q-label').textContent = `題 ${current + 1} / ${TOTAL}`;
  document.getElementById('progress-fill').style.width = `${(current / TOTAL) * 100}%`;
  document.getElementById('word-display').textContent = q.word;

  const posEl = document.getElementById('word-pos');
  posEl.textContent = q.pos || '';
  posEl.style.display = q.pos ? 'inline-block' : 'none';

  const card = document.getElementById('word-card');
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');

  const grid = document.getElementById('options-grid');
  grid.classList.remove('fade-in');
  void grid.offsetWidth;
  grid.classList.add('fade-in');

  q.options.forEach((opt, i) => {
    const btn = document.getElementById(`opt-${i}`);
    btn.textContent = opt.definition;
    btn.className = 'option-btn';
    btn.disabled = false;
    btn.onclick = () => handleAnswer(i, opt.id === q.id);
  });

  answered = false;
}

function handleAnswer(idx, isCorrect) {
  if (answered) return;

  const q = questions[current];
  const btns = [0,1,2,3].map(i => document.getElementById(`opt-${i}`));

  if (isCorrect) {
    answered = true;
    btns.forEach(b => b.disabled = true);
    btns[idx].classList.add('correct');
    if (!wrongThisQuestion) {
      score++;
      document.getElementById('score-display').textContent = score;
    }
    results.push({ word: q.word, pos: q.pos, definition: q.definition, correct: !wrongThisQuestion });

    setTimeout(() => {
      current++;
      if (current >= TOTAL) {
        showResult();
      } else {
        updateQuestion();
      }
    }, 850);
  } else {
    wrongThisQuestion = true;
    btns[idx].classList.add('wrong');
    btns[idx].disabled = true;
    setTimeout(() => {
      btns[idx].classList.remove('wrong');
    }, 400);
  }
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'flex';
  rs.style.flexDirection = 'column';

  document.getElementById('progress-fill').style.width = '100%';

  const wrong = TOTAL - score;
  document.getElementById('correct-count').textContent = score;
  document.getElementById('wrong-count').textContent = wrong;
  document.getElementById('result-subtitle').textContent = `答對 ${score} / ${TOTAL} 題`;

  const title = document.getElementById('result-title');
  const trophy = document.getElementById('trophy-emoji');
  if (score === TOTAL) {
    title.textContent = '完美！全部答對！'; trophy.textContent = '🏆';
  } else if (score >= 15) {
    title.textContent = '太棒了！繼續保持！'; trophy.textContent = '🌟';
  } else if (score >= 10) {
    title.textContent = '不錯喔！再接再厲！'; trophy.textContent = '💪';
  } else {
    title.textContent = '辛苦了！繼續加油！'; trophy.textContent = '📚';
  }

  trophy.style.animation = 'none';
  void trophy.offsetWidth;
  trophy.style.animation = 'trophy-bounce 0.6s cubic-bezier(.4,0,.2,1)';

  // Date & duration
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  document.getElementById('result-date').textContent = `${y} 年 ${m} 月 ${d} 日`;

  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const mins = Math.floor(elapsed / 60);
  const secs = elapsed % 60;
  document.getElementById('result-duration').textContent =
    mins > 0 ? `${mins} 分 ${String(secs).padStart(2,'0')} 秒` : `${secs} 秒`;

  // Review list
  const list = document.getElementById('review-list');
  list.innerHTML = '';
  results.forEach(r => {
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerHTML = `
      <span class="review-icon">${r.correct ? '✅' : '❌'}</span>
      <span class="review-word ${r.correct ? 'correct-word' : 'wrong-word'}">${r.word}</span>
      <span class="review-def">${r.definition}</span>
    `;
    list.appendChild(div);
  });
}
